{% extends "base.html" %}

{% block content %}
<div class="bg-white dark:bg-darkCard rounded-xl shadow-sm border border-gray-100 dark:border-gray-800 p-6">
    <div class="flex items-center justify-between mb-6">
        <div>
            <h2 class="text-xl font-bold text-gray-900 dark:text-white">Activity Logs</h2>
            <p class="text-gray-500 dark:text-gray-400 text-sm mt-1">Audit trail of all actions performed by the organizer.</p>
        </div>
        <button onclick="loadLogs()" class="text-gray-500 hover:text-indigo-600">
            <i class="fas fa-sync-alt"></i> Refresh
        </button>
    </div>

    <!-- Timeline/List view -->
    <div class="relative border-l border-gray-200 dark:border-gray-700 ml-3 space-y-6" id="logsContainer">
        <!-- populated by js -->
        <div class="ml-6 py-10 text-center text-gray-500">Loading logs <i class="fas fa-spinner fa-spin ml-2"></i></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('pageTitle').textContent = 'Activity Logs';
        loadLogs();
    });

    async function loadLogs() {
        const container = document.getElementById('logsContainer');
        try {
            const logs = await api.get('/stats/logs');
            if(logs.length === 0) {
                container.innerHTML = `<div class="ml-6 mt-2 text-gray-500 dark:text-gray-400">No activity logged yet.</div>`;
                return;
            }

            container.innerHTML = logs.map(log => {
                let icon = 'fa-info-circle';
                let iconColor = 'text-blue-500 bg-blue-100 dark:bg-blue-900 dark:text-blue-300';
                
                if (log.action === 'move') { icon = 'fa-arrow-right'; iconColor = 'text-green-500 bg-green-100 dark:bg-green-900 dark:text-green-300'; }
                else if (log.action === 'delete') { icon = 'fa-trash'; iconColor = 'text-red-500 bg-red-100 dark:bg-red-900 dark:text-red-300'; }
                else if (log.action === 'scan') { icon = 'fa-search'; iconColor = 'text-indigo-500 bg-indigo-100 dark:bg-indigo-900 dark:text-indigo-300'; }

                return `
                    <div class="mb-6 ml-6 relative">
                        <span class="absolute flex items-center justify-center w-8 h-8 rounded-full -left-10 ring-4 ring-white dark:ring-darkBg ${iconColor}">
                            <i class="fas ${icon} text-sm"></i>
                        </span>
                        <div class="p-4 bg-gray-50 dark:bg-gray-800 rounded-lg border border-gray-100 dark:border-gray-700">
                            <div class="flex justify-between items-start mb-1">
                                <h3 class="text-md font-semibold text-gray-900 dark:text-white capitalize">${log.action} Action</h3>
                                <time class="text-xs font-normal text-gray-400 dark:text-gray-500">${new Date(log.timestamp).toLocaleString()}</time>
                            </div>
                            <p class="text-sm font-normal text-gray-500 dark:text-gray-400">${log.details}</p>
                            ${log.file_path ? `<p class="text-xs mt-2 text-gray-400 font-mono truncate max-w-lg" title="${log.file_path}">File: ${log.file_path}</p>` : ''}
                        </div>
                    </div>
                `;
            }).join('');

        } catch (e) {
            container.innerHTML = `<div class="ml-6 mt-2 text-red-500">Error loading activity logs.</div>`;
        }
    }
</script>
{% endblock %}
