<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart File Organizer Pro</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#4f46e5',
                        secondary: '#1e293b',
                        darkBg: '#0f172a',
                        darkCard: '#1e293b'
                    }
                }
            }
        }
    </script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-darkBg dark:text-gray-100 font-sans antialiased transition-colors duration-200">

    <div class="flex h-screen overflow-hidden">
        
        <!-- Sidebar -->
        <aside id="sidebar" class="w-64 bg-white dark:bg-darkCard shadow-lg flex-shrink-0 transition-transform duration-300 transform -translate-x-full md:translate-x-0 fixed md:relative z-20 h-full">
            <div class="h-16 flex items-center justify-between px-6 border-b border-gray-200 dark:border-gray-700">
                <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500">Smart Organizer</span>
                <button id="closeSidebar" class="md:hidden text-gray-500 hover:text-gray-700 dark:hover:text-gray-300">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <nav class="p-4 space-y-2 overflow-y-auto h-[calc(100vh-4rem)]">
                <a href="/dashboard" class="nav-item flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-indigo-50 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-300 transition-colors">
                    <i class="fas fa-chart-pie w-5"></i>
                    <span>Dashboard</span>
                </a>
                <a href="/scanner" class="nav-item flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-indigo-50 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-300 transition-colors">
                    <i class="fas fa-search w-5"></i>
                    <span>Smart Scanner</span>
                </a>
                <a href="/organizer" class="nav-item flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-indigo-50 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-300 transition-colors">
                    <i class="fas fa-folder-tree w-5"></i>
                    <span>File Organizer</span>
                </a>
                <a href="/duplicates" class="nav-item flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-indigo-50 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-300 transition-colors">
                    <i class="fas fa-copy w-5"></i>
                    <span>Duplicate Finder</span>
                </a>
                <a href="/large-files" class="nav-item flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-indigo-50 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-300 transition-colors">
                    <i class="fas fa-weight-hanging w-5"></i>
                    <span>Large Files</span>
                </a>
                <a href="/rules" class="nav-item flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-indigo-50 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-300 transition-colors">
                    <i class="fas fa-filter w-5"></i>
                    <span>Custom Rules</span>
                </a>
                <a href="/logs" class="nav-item flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-indigo-50 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-300 transition-colors">
                    <i class="fas fa-clipboard-list w-5"></i>
                    <span>Activity Logs</span>
                </a>
                
                <div class="pt-6 mt-6 border-t border-gray-200 dark:border-gray-700">
                    <a href="/settings" class="nav-item flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-indigo-50 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-300 transition-colors">
                        <i class="fas fa-cog w-5"></i>
                        <span>Settings</span>
                    </a>
                    <button id="logoutBtn" class="w-full text-left flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20 text-red-600 dark:text-red-400 transition-colors">
                        <i class="fas fa-sign-out-alt w-5"></i>
                        <span>Logout</span>
                    </button>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
            
            <!-- Top Header -->
            <header class="h-16 bg-white dark:bg-darkCard shadow-sm flex items-center justify-between px-6 shrink-0 z-10 transition-colors">
                <div class="flex items-center">
                    <button id="openSidebar" class="md:hidden mr-4 text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 focus:outline-none">
                        <i class="fas fa-bars text-xl"></i>
                    </button>
                    <h1 class="text-xl font-semibold hidden sm:block" id="pageTitle">Overview</h1>
                </div>
                
                <div class="flex items-center space-x-4">
                    <span id="userGreeting" class="text-sm font-medium mr-2"></span>
                    <button id="themeToggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors focus:outline-none" aria-label="Toggle Dark Mode">
                        <i class="fas fa-moon text-gray-500 dark:text-gray-400 hidden dark:block"></i>
                        <i class="fas fa-sun text-gray-500 dark:text-gray-400 block dark:hidden"></i>
                    </button>
                    <div class="h-8 w-8 rounded-full bg-gradient-to-tr from-indigo-500 to-purple-500 flex items-center justify-center text-white font-bold shadow-sm">
                        <i class="fas fa-user-circle"></i>
                    </div>
                </div>
            </header>

            <!-- Main Page Content Area -->
            <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-50 dark:bg-darkBg p-6">
                <!-- Toast Notifications Container -->
                <div id="toastContainer" class="fixed top-4 right-4 z-50 flex flex-col space-y-2 pointer-events-none"></div>
                
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <!-- Overlay for mobile sidebar -->
    <div id="sidebarOverlay" class="fixed inset-0 bg-gray-900 bg-opacity-50 z-10 hidden md:hidden"></div>

    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
