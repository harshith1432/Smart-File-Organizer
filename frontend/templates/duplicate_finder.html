{% extends "base.html" %}

{% block content %}
<div class="space-y-6">
    <div class="bg-white dark:bg-darkCard rounded-xl shadow-sm border border-gray-100 dark:border-gray-800 p-6">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h2 class="text-xl font-bold text-gray-900 dark:text-white">Duplicate File Finder</h2>
                <p class="text-gray-500 dark:text-gray-400 text-sm mt-1">Review exact duplicate files detected on your system. Keep one, delete the rest to save space.</p>
            </div>
            <button onclick="loadDuplicates()" class="p-2 text-gray-500 hover:text-indigo-600 transition-colors">
                <i class="fas fa-sync-alt"></i>
            </button>
        </div>

        <div id="duplicateContainer" class="space-y-6">
            <!-- Duplicates loaded via JS -->
            <div class="text-center py-10 text-gray-500 dark:text-gray-400">
                <i class="fas fa-spinner fa-spin text-3xl mb-3"></i>
                <p>Analyzing hashes...</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('pageTitle').textContent = 'Duplicate Finder';
        loadDuplicates();
    });

    async function loadDuplicates() {
        const container = document.getElementById('duplicateContainer');
        try {
            const duplicates = await api.get('/stats/duplicates');
            
            if (duplicates.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12 bg-gray-50 dark:bg-gray-800/50 rounded-lg">
                        <i class="fas fa-check-circle text-4xl text-green-500 mb-4"></i>
                        <h3 class="text-lg font-medium text-gray-900 dark:text-white">Clean System</h3>
                        <p class="text-gray-500 dark:text-gray-400 mt-2">No duplicate files found in the indexed locations.</p>
                    </div>`;
                return;
            }

            container.innerHTML = duplicates.map((group, index) => {
                const pathsHtml = group.file_paths.map(path => `
                    <div class="flex items-center justify-between p-3 bg-gray-50 dark:bg-gray-800 rounded border border-gray-100 dark:border-gray-700">
                        <div class="flex items-center space-x-3 overflow-hidden">
                            <input type="checkbox" value="${path}" class="dup-checkbox-${group.id} w-4 h-4 text-indigo-600 bg-gray-100 border-gray-300 rounded focus:ring-indigo-500 dark:focus:ring-indigo-600 dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600">
                            <span class="text-sm text-gray-700 dark:text-gray-300 truncate" title="${path}">${path}</span>
                        </div>
                    </div>
                `).join('');

                return `
                    <div class="border border-gray-200 dark:border-gray-700 rounded-lg overflow-hidden">
                        <div class="bg-gray-50 dark:bg-gray-800/80 px-4 py-3 flex items-center justify-between border-b border-gray-200 dark:border-gray-700">
                            <div>
                                <h4 class="font-medium text-gray-900 dark:text-white">Duplicate Group #${index + 1}</h4>
                                <p class="text-xs text-red-500 mt-1">Wasted Space: ${ui.formatBytes(group.total_wasted_space)}</p>
                            </div>
                            <div class="flex space-x-2">
                                <button onclick="selectOldest(${group.id})" class="text-xs px-3 py-1.5 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded hover:bg-gray-50 dark:hover:bg-gray-600 transition">Select Oldest</button>
                                <button onclick="resolveDuplicate(${group.id})" class="text-xs px-3 py-1.5 bg-red-600 hover:bg-red-700 text-white rounded font-medium shadow-sm transition">Delete Selected</button>
                            </div>
                        </div>
                        <div class="p-4 space-y-2">
                            ${pathsHtml}
                        </div>
                    </div>
                `;
            }).join('');

        } catch (error) {
            container.innerHTML = `
                <div class="text-center py-10 text-red-500">
                    <p>Error loading duplicates: ${error.message}</p>
                </div>`;
        }
    }

    function selectOldest(groupId) {
        // Simple logic: Select all except the first one in the array
        const checkboxes = document.querySelectorAll(`.dup-checkbox-${groupId}`);
        checkboxes.forEach((cb, i) => {
            cb.checked = (i !== 0);
        });
    }

    async function resolveDuplicate(groupId) {
        const checkboxes = document.querySelectorAll(`.dup-checkbox-${groupId}:checked`);
        const pathsToDelete = Array.from(checkboxes).map(cb => cb.value);
        
        if (pathsToDelete.length === 0) {
            ui.showToast('Please select files to delete.', 'warning');
            return;
        }

        if (!confirm(`Are you sure you want to permanently delete ${pathsToDelete.length} file(s)?`)) return;

        try {
            await api.post('/stats/duplicates/resolve', {
                duplicate_id: groupId,
                paths_to_delete: pathsToDelete
            });
            ui.showToast('Files deleted successfully.', 'success');
            loadDuplicates(); // Reload list
        } catch (error) {
            ui.showToast('Failed to delete files.', 'error');
        }
    }
</script>
{% endblock %}
